version: '3'

services:
  bd_lanchonete:
    container_name: bd_lanchonete
    image: ${BD_IMAGE}
    env_file:
      - .env
    ports:
    ## A porta 4050 é a do host e a 3306 a do container
      - "4050:${BD_PORT}"
    networks:
      - net_lanchonete
    volumes:
      - dados_lanchonete:/var/lib/${BD_DIR}
    command: ["${BD_COMMAND}"]
    
  app:
    container_name: app_lanchonete
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MAVEN_GROUPID_BD: ${MAVEN_GROUPID_BD}
        MAVEN_ARTIFACT_BD: ${MAVEN_ARTIFACT_BD}
        MAVEN_VERSION_BD: ${MAVEN_VERSION_BD}
    env_file:
      - .env
    ports:
      - "8080:8080"
    networks:
      - net_lanchonete
    depends_on:
      - bd_lanchonete

volumes:
  dados_lanchonete:

networks:
  net_lanchonete:
    driver: bridge
